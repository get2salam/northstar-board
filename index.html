<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Northstar Board</title>
    <meta
      name="description"
      content="A local-first constellation planner for solo founders. Turn goals and milestones into stars you can steer by."
    />
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>✦</text></svg>" />
    <link rel="stylesheet" href="css/styles.css" />
    <script type="module" src="js/app.js" defer></script>
  </head>
  <body>
    <div class="cosmos" aria-hidden="true"></div>

    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">✦</span>
        <span class="brand-name">Northstar Board</span>
        <span class="brand-tag">local-first planning</span>
      </div>
      <nav class="toolbar" aria-label="Board actions">
        <button class="btn ghost" disabled title="Coming next commit">New star</button>
        <button class="btn ghost" disabled title="Coming next commit">Import</button>
        <button class="btn ghost" disabled title="Coming next commit">Export</button>
        <button class="btn ghost" disabled title="Coming next commit">Help</button>
      </nav>
    </header>

    <main class="stage" aria-label="Constellation board">
      <div id="board-root" class="board-root"></div>
      <div class="empty-hero">
        <h1>Chart the course.</h1>
        <p>
          Your board is empty. Stars and interactions arrive as you create goals —
          creation UI lands in the next commit.
        </p>
      </div>
    </main>

    <footer class="statusbar">
      <span id="status">Scaffold ready. Stars incoming.</span>
    </footer>
  </body>
</html>
